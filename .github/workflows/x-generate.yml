name: X generate posts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 0'   # 毎週月曜 06:00 JST — 週3件生成

permissions:
  contents: read
  issues: write

concurrency:
  group: x-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci --prefix x-bot
      - name: 投稿文を生成してキューに追加
        run: node x-bot/generate.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 失敗をIssueに通知
        if: failure()
        run: >-
          gh issue comment 1 --repo ${{ github.repository }}
          --body "[失敗] ${{ github.workflow }} が失敗しました: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
