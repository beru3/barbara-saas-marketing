name: X generate posts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 0'   # 毎週月曜 06:00 JST — 週3件生成

permissions:
  contents: read
  issues: write

concurrency:
  group: x-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --prefix x-bot
      - name: 投稿文を生成してキューに追加
        run: node x-bot/generate.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
