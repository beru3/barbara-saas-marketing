name: Add posts 20260722 to issue

on:
  workflow_dispatch:

jobs:
  add-posts:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Insert 3 new posts into issue #1
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
            });
            const body = issue.data.body;
            const MARKER = '\n\n## 投稿済み';
            const newPosts = [
              '- [ ] `gen-20260722-1` 今週金曜は土用の丑の日です。「うなぎで夏バテ予防を」という話が出るこの季節、生活習慣病の患者さんは「食事に気をつけているから大丈夫」と感じやすい。症状がなく元気に見えるときこそ、通院が遠のくタイミングです。先生の院に、気づける仕組みはありますか。',
              '- [ ] `gen-20260722-2` 「患者フォローを誰かが気合でやっている院」と「仕組みで回っている院」では、夏のスタッフ負担がまったく違います。お盆前後にスタッフが疲弊してきたら、患者フォローを\"気合\"に頼っているサインかもしれません。→ https://note.com/furuie_akihiro/n/n1327b5ec4e27',
              '- [ ] `gen-20260722-3` 「夏は外来が落ち着くから助かる」と感じる先生がいます。でも同時に、「来ていない患者さんが増えている」という状態かもしれません。外来が静かな夏だからこそ、来なくなった患者さんに向き合う時間が実は一番ある。先生の院の今月、何人来なくなりましたか。',
            ].join('\n');
            if (body.includes('gen-20260722-1')) {
              console.log('Already inserted — skipping.');
              return;
            }
            const idx = body.indexOf(MARKER);
            if (idx === -1) {
              throw new Error('Marker not found in issue body');
            }
            const newBody = body.slice(0, idx) + '\n' + newPosts + body.slice(idx);
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: newBody,
            });
            console.log('Issue #1 updated with gen-20260722-1/2/3');
