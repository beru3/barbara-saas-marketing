name: X auto-post

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'check（認証確認のみ） / post（承認済みを1件投稿）'
        type: choice
        options: [check, post]
        default: check
  schedule:
    # 動的本数制御：各スロットで「承認待ち残数 >= しきい値」のときだけ1件投稿
    - cron: '0 3 * * *'    # 12:00 JST スロット1（しきい値1）
    - cron: '0 7 * * *'    # 16:00 JST スロット2（しきい値3）
    - cron: '0 10 * * *'   # 19:00 JST スロット3（しきい値5）

permissions:
  contents: write
  issues: write

concurrency:
  group: x-post
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 依存関係のインストール
        run: npm ci --prefix x-bot
      - name: 実行
        run: |
          MODE="${{ inputs.mode || 'post' }}"
          case "${{ github.event.schedule }}" in
            "0 3 * * *")  THR=1 ;;
            "0 7 * * *")  THR=3 ;;
            "0 10 * * *") THR=5 ;;
            *)            THR=1 ;;
          esac
          echo "mode=$MODE threshold=$THR"
          node x-bot/post.mjs "$MODE" "$THR"
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 投稿台帳をコミット
        if: ${{ (inputs.mode || 'post') == 'post' }}
        run: |
          git config user.name "x-bot"
          git config user.email "noreply@anthropic.com"
          git add x-bot/posted.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: x-bot 投稿台帳を更新"
            git pull --rebase origin main
            git push
          fi
