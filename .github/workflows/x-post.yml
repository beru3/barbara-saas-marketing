name: X auto-post

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'check（認証確認のみ） / post（承認済みを1件投稿）'
        type: choice
        options: [check, post]
        default: check
  schedule:
    - cron: '0 3 * * *'   # 毎日 12:00 JST（承認済みがあれば1件投稿）

permissions:
  contents: write
  issues: write

concurrency:
  group: x-post
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 依存関係のインストール
        run: npm ci --prefix x-bot
      - name: 実行
        run: node x-bot/post.mjs "${{ inputs.mode || 'post' }}"
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 投稿台帳をコミット
        if: ${{ (inputs.mode || 'post') == 'post' }}
        run: |
          git config user.name "x-bot"
          git config user.email "noreply@anthropic.com"
          git add x-bot/posted.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: x-bot 投稿台帳を更新"
            git pull --rebase origin main
            git push
          fi
