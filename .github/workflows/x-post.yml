name: X auto-post

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'check（認証確認のみ） / post（承認済みを1件投稿）'
        type: choice
        options: [check, post]
        default: check
  schedule:
    # 1日1〜2投稿：院長の活動時間帯に集中
    - cron: '0 3 * * *'    # 12:00 JST 昼休み（メインスロット）
    - cron: '0 11 * * *'   # 20:00 JST 診療後（サブスロット）

permissions:
  contents: write
  issues: write

concurrency:
  group: x-post
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 依存関係のインストール
        run: npm ci --prefix x-bot
      - name: 実行
        id: post
        run: |
          MODE="${{ inputs.mode || 'post' }}"
          case "${{ github.event.schedule }}" in
            "0 3 * * *")  THR=1 ;;   # 昼: ストック1件以上で投稿
            "0 11 * * *") THR=3 ;;   # 夜: ストック3件以上で投稿
            *)            THR=1 ;;
          esac
          echo "mode=$MODE threshold=$THR"
          node x-bot/post.mjs "$MODE" "$THR"
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: ストック不足時に投稿文を自動生成
        if: >-
          steps.post.outputs.remaining != ''
          && steps.post.outputs.remaining < 5
        run: gh workflow run x-generate.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 承認リマインドメール
        if: >-
          github.event.schedule == '0 3 * * *'
          && steps.post.outputs.remaining != ''
          && steps.post.outputs.remaining < 3
        run: node x-bot/notify-low-stock.mjs "${{ steps.post.outputs.remaining }}"
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPO: ${{ github.repository }}

      - name: 投稿台帳をコミット
        if: ${{ (inputs.mode || 'post') == 'post' }}
        run: |
          git config user.name "x-bot"
          git config user.email "noreply@anthropic.com"
          git add x-bot/posted.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: x-bot 投稿台帳を更新"
            git pull --rebase origin main
            git push
          fi
