name: X auto-post

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'check（認証確認のみ） / post（承認済みを1件投稿）'
        type: choice
        options: [check, post]
        default: check
  # 自動投稿スケジュール（生成→承認フローが整い次第、有効化）
  # schedule:
  #   - cron: '0 3 * * 1,3,5'   # 月・水・金 12:00 JST

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 依存関係のインストール
        run: npm ci --prefix x-bot
      - name: 実行
        run: node x-bot/post.mjs "${{ inputs.mode }}"
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      - name: キュー更新をコミット
        if: inputs.mode == 'post'
        run: |
          git config user.name "x-bot"
          git config user.email "noreply@anthropic.com"
          git add x-bot/queue.json
          git diff --staged --quiet || git commit -m "chore: x-bot 投稿後のキュー更新"
          git push
